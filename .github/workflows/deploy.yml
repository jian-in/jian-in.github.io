name: Deploy Hugo Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENV: production
        run: |
          hugo --minify --gc
          echo "✅ Hugo 构建完成"

      - name: Copy custom CSS
        run: |
          if [ -f "static/css/custom.css" ]; then
            mkdir -p public/css
            cp static/css/custom.css public/css/custom.css
            echo "✅ custom.css 已复制到 public/css/"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          cname: forgiving.top

      - name: Success message
        run: |
          echo "🎉 部署成功！"
          echo "🌐 访问: https://forgiving.top/"
