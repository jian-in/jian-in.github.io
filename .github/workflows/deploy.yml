name: Deploy Hugo Blog to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.2'
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENV: production
        run: |
          hugo --minify --gc
          echo "✅ Hugo 构建完成"

      - name: Copy custom CSS
        run: |
          if [ -f "static/css/custom.css" ]; then
            mkdir -p public/css
            cp static/css/custom.css public/css/custom.css
            echo "✅ custom.css 已复制到 public/css/"
          fi

      - name: Verify build output
        run: |
          echo "=== public 目录内容 ==="
          ls -la public/
          echo ""
          echo "=== 检查关键文件 ==="
          for f in index.html index.xml index.json sitemap.xml 404.html; do
            if [ -f "public/$f" ]; then
              echo "✅ $f 存在 ($(wc -c < public/$f) bytes)"
            else
              echo "❌ $f 缺失!"
            fi
          done
          echo ""
          echo "=== HTML 文件列表 ==="
          find public/ -name "*.html" -type f
          test -f public/index.html || exit 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          cname: forgiving.top

      - name: Success message
        run: |
          echo "🎉 部署成功！"
          echo "🌐 访问: https://forgiving.top/"
